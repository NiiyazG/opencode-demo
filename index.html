<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello from OpenCode!</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      background: rgba(255,255,255,0.15);
      padding: 2rem 3rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 600px;
    }
    h1 { margin: 0 0 1rem; font-size: 2.5rem; }
    p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 2rem; }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    .footer { font-size: 0.9rem; opacity: 0.8; }
    a { color: #ffde59; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🦊</div>
    <h1>OpenCode Demo</h1>
    <p>Эта простая HTML-страница создана с помощью OpenCode и показывает, что можно быстро развернуть статический сайт на GitHub Pages.</p>
    <p>Спасибо, что попробовали!</p>
    <div class="footer">
      <p>Создано: <span id="date"></span></p>
      <script>document.getElementById('date').textContent = new Date().toLocaleDateString('ru-RU');</script>
    </div>
  </div>
</body>
</html>
